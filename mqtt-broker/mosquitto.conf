# =============================================================================
# Sumatic Modern IoT - Mosquitto MQTT Broker Configuration
# =============================================================================

# -----------------------------------------------------------------------------
# Persistence Settings
# -----------------------------------------------------------------------------
persistence true
persistence_location /mosquitto/data/
autosave_interval 1800

# -----------------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------------
log_dest stdout
log_dest file /mosquitto/log/mosquitto.log
log_type all
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S

# -----------------------------------------------------------------------------
# Listeners
# -----------------------------------------------------------------------------

# Default MQTT listener (TCP)
listener 1883
protocol mqtt

# WebSocket listener (for frontend connections)
listener 9001
protocol websockets

# -----------------------------------------------------------------------------
# Authentication & Authorization
# -----------------------------------------------------------------------------

# Disable anonymous access - authentication required
allow_anonymous false

# Password file for authentication
# Generate with: mosquitto_passwd -c /mosquitto/config/passwd sumatic-backend
password_file /mosquitto/config/passwd

# Access Control List
acl_file /mosquitto/config/acl

# -----------------------------------------------------------------------------
# Connection Limits
# -----------------------------------------------------------------------------
max_connections -1
max_queued_messages 1000
max_queued_bytes 0

# -----------------------------------------------------------------------------
# IP-based Access Control (IP Whitelist)
# -----------------------------------------------------------------------------
# IMPORTANT: Mosquitto doesn't have built-in IP whitelist functionality.
# Use firewall rules (iptables/ufw) or Docker network policies instead.
#
# Example iptables rules for production:
#   iptables -A INPUT -p tcp --dport 1883 -s 192.168.1.0/24 -j ACCEPT
#   iptables -A INPUT -p tcp --dport 1883 -s 10.0.0.0/8 -j ACCEPT
#   iptables -A INPUT -p tcp --dport 1883 -j DROP
#
# Example ufw rules:
#   ufw allow from 192.168.1.0/24 to any port 1883
#   ufw allow from 10.0.0.0/8 to any port 1883
#   ufw deny 1883
#
# Docker network isolation:
#   - Use Docker networks to isolate MQTT broker
#   - Only expose ports to trusted networks
#   - Use Docker Compose network policies

# -----------------------------------------------------------------------------
# Timeouts
# -----------------------------------------------------------------------------
keepalive_interval 60
connection_messages true

# -----------------------------------------------------------------------------
# Security - TLS/SSL Encryption for Production
# -----------------------------------------------------------------------------
# IMPORTANT: For production use, obtain certificates from a trusted CA (Let's Encrypt, etc.)
# Self-signed certificates are suitable for development/testing only

# MQTT over TLS (MQTTS) - Port 8883
listener 8883
protocol mqtt
cafile /mosquitto/config/certs/ca.crt
certfile /mosquitto/config/certs/mqtt-server.crt
keyfile /mosquitto/config/certs/mqtt-server.key
require_certificate false  # Set to true to require client certificates
tls_version tlsv1.2

# WebSocket with TLS (WSS) - Port 9883
listener 9883
protocol websockets
cafile /mosquitto/config/certs/ca.crt
certfile /mosquitto/config/certs/mqtt-server.crt
keyfile /mosquitto/config/certs/mqtt-server.key
require_certificate false  # Set to true to require client certificates
tls_version tlsv1.2

# Additional TLS security settings
# tls_version tlsv1.3  # Uncomment for TLS 1.3 only (more secure, less compatible)
# ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384  # Custom cipher suite
