# =============================================================================
# Sumatic Modern IoT - Development Docker Compose
# =============================================================================
# Usage:
#   Development: docker-compose up -d
#   View logs:   docker-compose logs -f [service]
#   Stop:        docker-compose down
#   Reset:       docker-compose down -v
# =============================================================================

version: "3.8"

services:
  # ---------------------------------------------------------------------------
  # Redis (Optional - for caching)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: sumatic-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - sumatic-network

  # ---------------------------------------------------------------------------
  # Backend API (FastAPI)
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: sumatic-backend
    restart: unless-stopped
    environment:
      # Database (SQLite for development)
      - DATABASE_URL=sqlite+aiosqlite:///./sumatic_modern.db
      
      # Redis
      - REDIS_URL=redis://redis:6379/0
      
      # MQTT (Local - through SSH tunnel)
      - MQTT_BROKER_HOST=127.0.0.1
      - MQTT_BROKER_PORT=1883
      - MQTT_TOPIC_ALLDATAS=Alldatas
      - MQTT_TOPIC_COMMANDS=Commands
      
      # SSH Tunnel Configuration
      - SSH_ENABLED=true
      - SSH_HOST=31.58.236.246
      - SSH_PORT=22
      - SSH_USER=Administrator
      - SSH_PASSWORD=fkgBHL489
      - SSH_REMOTE_MQTT_HOST=127.0.0.1
      - SSH_REMOTE_MQTT_PORT=1883
      - SSH_LOCAL_MQTT_HOST=127.0.0.1
      - SSH_LOCAL_MQTT_PORT=1883
      - SSH_KEEPALIVE=30
      
      # CORS
      - CORS_ORIGINS=http://localhost:3000,http://localhost:8000,http://frontend:3000
      
      # Debug
      - DEBUG=true
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
      - backend_venv:/app/.venv
      - backend_db:/app/data
    depends_on:
      redis:
        condition: service_healthy
    cap_add:
      - NET_ADMIN  # Required for SSH tunnel
      - NET_RAW
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 256M
    networks:
      - sumatic-network

  # ---------------------------------------------------------------------------
  # Frontend (Next.js)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8000
        - NEXT_PUBLIC_WS_URL=ws://localhost:8000
    container_name: sumatic-frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
      - NODE_ENV=development
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - sumatic-network

# -----------------------------------------------------------------------------
# Networks
# -----------------------------------------------------------------------------
networks:
  sumatic-network:
    driver: bridge
    name: sumatic-network

# -----------------------------------------------------------------------------
# Volumes
# -----------------------------------------------------------------------------
volumes:
  redis_data:
    name: sumatic-redis-data
  backend_venv:
    name: sumatic-backend-venv
  backend_db:
    name: sumatic-backend-db
