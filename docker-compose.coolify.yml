# ==============================================================================
# Sumatic Modern IoT - Coolify Deployment Docker Compose
# ==============================================================================
# Bu docker-compose dosyası Coolify platformunda deploy için hazırlanmıştır.
# SSH tunnel üzerinden MQTT bağlantısı korunmuştur.
# ==============================================================================

version: '3.8'

services:
  # -----------------------------------------------------------------------------
  # PostgreSQL + TimescaleDB Database
  # -----------------------------------------------------------------------------
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: sumatic-postgres-coolify
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sumatic-network

  # -----------------------------------------------------------------------------
  # Redis (Rate Limiting ve Caching)
  # -----------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: sumatic-redis-coolify
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sumatic-network

  # -----------------------------------------------------------------------------
  # Backend (FastAPI)
  # -----------------------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: production
    container_name: sumatic-backend-coolify
    restart: unless-stopped
    environment:
      # Database
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_POOL_SIZE: ${DATABASE_POOL_SIZE:-20}
      DATABASE_MAX_OVERFLOW: ${DATABASE_MAX_OVERFLOW:-40}
      
      # Redis
      REDIS_URL: ${REDIS_URL}
      
      # MQTT (SSH Tunnel üzerinden)
      MQTT_BROKER_HOST: ${MQTT_BROKER_HOST}
      MQTT_BROKER_PORT: ${MQTT_BROKER_PORT}
      MQTT_USERNAME: ${MQTT_USERNAME}
      MQTT_PASSWORD: ${MQTT_PASSWORD}
      MQTT_CLIENT_ID: ${MQTT_CLIENT_ID}
      MQTT_TOPIC_ALLDATAS: ${MQTT_TOPIC_ALLDATAS}
      MQTT_TOPIC_COMMANDS: ${MQTT_TOPIC_COMMANDS}
      
      # SSH Tunnel
      SSH_ENABLED: ${SSH_ENABLED:-true}
      SSH_HOST: ${SSH_HOST}
      SSH_PORT: ${SSH_PORT:-22}
      SSH_USER: ${SSH_USER}
      SSH_KEY_PATH: ${SSH_KEY_PATH}
      SSH_REMOTE_MQTT_HOST: ${SSH_REMOTE_MQTT_HOST}
      SSH_REMOTE_MQTT_PORT: ${SSH_REMOTE_MQTT_PORT}
      SSH_LOCAL_MQTT_HOST: ${SSH_LOCAL_MQTT_HOST}
      SSH_LOCAL_MQTT_PORT: ${SSH_LOCAL_MQTT_PORT}
      SSH_KEEPALIVE: ${SSH_KEEPALIVE:-30}
      
      # JWT
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: ${JWT_REFRESH_TOKEN_EXPIRE_DAYS:-7}
      
      # Security
      CORS_ORIGINS: ${CORS_ORIGINS}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-100}
      
      # Application
      APP_NAME: ${APP_NAME:-Sumatic Modern IoT}
      APP_VERSION: ${APP_VERSION:-1.0.0}
      DEBUG: ${DEBUG:-false}
      API_V1_PREFIX: ${API_V1_PREFIX:-/api/v1}
      TIMEZONE: ${TIMEZONE:-Europe/Istanbul}
      
      # Device Monitoring
      DEVICE_OFFLINE_THRESHOLD_SECONDS: ${DEVICE_OFFLINE_THRESHOLD_SECONDS:-600}
      DEVICE_RETRY_INTERVAL_SECONDS: ${DEVICE_RETRY_INTERVAL_SECONDS:-60}
      DEVICE_MAX_RETRIES: ${DEVICE_MAX_RETRIES:-5}
      SNAPSHOT_INTERVAL_MINUTES: ${SNAPSHOT_INTERVAL_MINUTES:-10}
      SPIKE_STREAK_THRESHOLD: ${SPIKE_STREAK_THRESHOLD:-5}
      SPIKE_WINDOW_SIZE: ${SPIKE_WINDOW_SIZE:-5}
      
      # Admin User (İlk kurulum için)
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@sumatic.io}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    volumes:
      # SSH key için volume (Coolify secrets olarak eklenmeli)
      - ssh_keys:/app/.ssh:ro
      - backend_logs:/app/logs
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - sumatic-network

  # -----------------------------------------------------------------------------
  # Frontend (Next.js)
  # -----------------------------------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: runner
    container_name: sumatic-frontend-coolify
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
      NODE_ENV: ${NODE_ENV:-production}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - sumatic-network

# -----------------------------------------------------------------------------
# Volumes
# -----------------------------------------------------------------------------
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  ssh_keys:
    driver: local
  backend_logs:
    driver: local

# -----------------------------------------------------------------------------
# Networks
# -----------------------------------------------------------------------------
networks:
  sumatic-network:
    driver: bridge
